<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inverted Pendulum PID - Control Simulations</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="header">
        <h1>Inverted Pendulum (PID)</h1>
    </div>

    <div class="container">
        <a href="/" class="nav-link">&larr; Back to Dashboard</a>
        
        <div class="sim-layout">
            <div class="panel">
                <h3>Simulation</h3>
                <canvas id="simCanvas"></canvas>
                <div style="margin-top: 15px;">
                    <button id="togglePIDBtn" class="btn off">PID: OFF</button>
                </div>
            </div>
            
            <div class="panel">
                <h3>PID Controller Tuning</h3>
                <div class="control-group">
                    <label>Proportional ($K_p$): <span id="kpVal">50.0</span></label>
                    <input type="range" id="kpRange" min="0" max="250" step="1" value="50">
                </div>
                <div class="control-group">
                    <label>Integral ($K_i$): <span id="kiVal">0.0</span></label>
                    <input type="range" id="kiRange" min="0" max="50" step="0.1" value="0.0">
                </div>
                <div class="control-group">
                    <label>Derivative ($K_d$): <span id="kdVal">10.0</span></label>
                    <input type="range" id="kdRange" min="0" max="50" step="0.5" value="10.0">
                </div>
                <p style="color: var(--text-secondary); font-size: 0.9em; margin-top: 20px;">
                    Goal: Balance the pendulum perfectly upright ($\theta = \pi$). Turn the PID ON, and challenge it by dragging the mass left or right!
                </p>
                <div style="background-color: var(--bg-color); padding: 10px; border-radius: 6px; border: 1px solid var(--border-color); margin-top: 10px;">
                    <span style="color: var(--text-secondary);">Current Control Torque: </span>
                    <span id="torqueDisplay" style="color: var(--success-color); font-weight: bold;">0.00</span>
                </div>
            </div>
        </div>

        <div class="panel" style="margin-top: 20px;">
            <h3>Real-time Metrics: Angle vs. Time</h3>
            <div class="chart-container">
                <canvas id="chartCanvas"></canvas>
            </div>
        </div>
    </div>
    <script src="/static/js/inverted_pendulum.js"></script>
</body>
</html>
